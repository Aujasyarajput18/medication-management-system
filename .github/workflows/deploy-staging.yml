# ══════════════════════════════════════════════════════════════════════════════
# AUJASYA — Staging Deployment
# Runs on merge to main: build, push, deploy, migrate, health check
# ══════════════════════════════════════════════════════════════════════════════

name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/aujasya
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec api alembic upgrade head
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans
            sleep 10

      - name: Health check
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 15
          max_attempts: 5
          retry_wait_seconds: 10
          command: curl -f https://staging.aujasya.in/api/v1/health

      - name: Notify on success
        if: success()
        run: echo "✅ Staging deployment successful — ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Staging deployment FAILED — ${{ github.sha }}"
