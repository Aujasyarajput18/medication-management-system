# ══════════════════════════════════════════════════════════════════════════════
# AUJASYA — Local Development Stack
# Usage: docker compose up -d
# All services reachable at localhost:3000 (web) and localhost:8000 (api)
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aujasya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aujasya
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aujasya_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aujasya -d aujasya_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aujasya_internal

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aujasya-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aujasya_internal

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: aujasya-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aujasya:password@postgres:5432/aujasya_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      APP_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aujasya_internal

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: aujasya-celery-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aujasya:password@postgres:5432/aujasya_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aujasya_internal

  # ── Celery Beat ────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: aujasya-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aujasya:password@postgres:5432/aujasya_dev
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aujasya_internal

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: aujasya-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: development
      BACKEND_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aujasya_internal

  # ── Nginx Reverse Proxy (optional for dev) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: aujasya-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    networks:
      - aujasya_internal
    profiles:
      - with-nginx

  # ── Phase 2: LLaVA OCR Microservice ──────────────────────────────────
  llava-service:
    build:
      context: ./apps/api/llava_service
      dockerfile: Dockerfile
    container_name: aujasya-llava
    ports:
      - "8001:8001"
    environment:
      - LLAVA_MOCK=${LLAVA_MOCK:-true}
      - LLAVA_MAX_IMAGE_SIZE_MB=${LLAVA_MAX_IMAGE_SIZE_MB:-10}
    networks:
      - aujasya_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Uncomment for GPU access in production:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  aujasya_internal:
    driver: bridge
